# Spring Boot Application Properties
# TradeJournal - Portfolio Analytics & Risk Management System

# ─── Server Configuration ───
server.port=${PORT:8080}
server.servlet.context-path=/
spring.application.name=TradeJournal

# ─── Database Configuration (environment variables or defaults) ───
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/TradeJournal}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:redBlue3011!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate Configuration ───
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Jackson JSON Configuration ───
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ─── Logging ───
logging.level.root=INFO
logging.level.com.tradejournal=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ─── Application Custom Properties ───
app.portfolio.id=1
app.default-capital=100000.00
app.concentration-limit=0.10
app.max-position-size=10000
